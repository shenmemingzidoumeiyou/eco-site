<main>
    <div class="container">
        <h1 class="page-title">日常环保行动指南</h1>
        <p style="text-align:center; margin-bottom:40px;">从今天开始，每一个小习惯都能让地球更美好</p>
        <div class="card-grid">
            <div class="card">
                <div class="card-icon">💧</div>
                <h3>一水多用</h3>
                <p>洗菜水、淘米水可浇花；洗衣水、洗澡水可拖地、冲厕所。</p>
            </div>
            <div class="card">
                <div class="card-icon">⚡</div>
                <h3>随手关灯</h3>
                <p>离开房间随手关灯，使用LED节能灯，每月可省电10-15度。</p>
            </div>
            <div class="card">
                <div class="card-icon">🥤</div>
                <h3>自带水杯</h3>
                <p>拒绝一次性纸杯，自带水杯每年可减少200个一次性杯子。</p>
            </div>
            <div class="card">
                <div class="card-icon">🚲</div>
                <h3>短途骑行</h3>
                <p>3公里内步行或骑行，每少开1公里车减碳0.22kg。</p>
            </div>
            <div class="card">
                <div class="card-icon">🍚</div>
                <h3>光盘行动</h3>
                <p>按需点餐，剩菜打包，减少食物浪费。</p>
            </div>
            <div class="card">
                <div class="card-icon">🗑️</div>
                <h3>垃圾分类</h3>
                <p>可回收物、厨余垃圾、有害垃圾、其他垃圾要分清。</p>
            </div>
        </div>
    </div>
</main>
